{% extends 'base.html' %}
{% block title %}Server Error — Marg Darshak{% endblock %}
{% block content %}
<div style="position:relative;z-index:1;min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:40px 20px;text-align:center;">
  <div style="animation:fadeUp .6s ease both;">
    <div style="font-size:72px;margin-bottom:20px;opacity:.7;">⚙️</div>
    <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:rgba(255,255,255,.25);margin-bottom:10px;">Error 500</p>
    <h1 style="font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:white;margin-bottom:12px;">Something Went Wrong</h1>
    <p style="color:rgba(255,255,255,.45);font-size:15px;line-height:1.7;margin-bottom:32px;max-width:400px;margin-inline:auto;">An unexpected error occurred. Please try again.</p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <a href="/" class="btn-p">← Go Home</a>
      <a href="javascript:location.reload()" class="btn-g">Try Again</a>
    </div>
  </div>
</div>
{% endblock %}
