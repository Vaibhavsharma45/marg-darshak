{% extends 'base.html' %}
{% block title %}Career Assessment — Marg Darshak{% endblock %}
{% block content %}
<div style="position:relative;z-index:1;min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:40px 20px;text-align:center;">
  <div style="animation:fadeUp .5s ease both;">
    <div style="font-size:3rem;margin-bottom:16px;">🎯</div>
    <h2 style="font-family:'Syne',sans-serif;font-weight:800;color:white;margin-bottom:10px;">Career Assessment</h2>
    <p style="color:rgba(255,255,255,.45);font-size:15px;margin-bottom:28px;">Discover your ideal career path with our AI-powered assessment.</p>
    <a href="/assessment" style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#6366f1,#ec4899);border:none;border-radius:12px;padding:13px 28px;color:white;font-weight:600;font-size:15px;text-decoration:none;box-shadow:0 6px 20px rgba(99,102,241,.35);">Begin Assessment →</a>
  </div>
</div>
<style>@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}</style>
{% endblock %}
