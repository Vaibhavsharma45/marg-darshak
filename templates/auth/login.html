{% extends 'base.html' %}
{% block title %}Login — Marg Darshak{% endblock %}
{% block extra_css %}
<style>
.auth-wrap { min-height: calc(100vh - 62px); display:flex; align-items:center; justify-content:center; padding:40px 20px; position:relative; z-index:1; }
.auth-wrap::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 600px 500px at 50% 0%,rgba(124,58,237,0.12),transparent); pointer-events:none; z-index:0; }
.auth-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(24px); border-radius:24px; width:100%; max-width:420px; overflow:hidden; position:relative; z-index:1; }
.auth-top { background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(236,72,153,0.18)); padding:36px 36px 28px; text-align:center; position:relative; }
.auth-top::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(167,139,250,0.5),transparent); }
.auth-body { padding:32px 36px; }
.auth-field { margin-bottom:20px; }
.auth-field label { display:block; font-size:0.76rem; font-weight:600; color:var(--text-dim); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.8px; }
.auth-field input { width:100%; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:12px; color:white; padding:12px 16px; font-size:0.9rem; font-family:var(--font-body); outline:none; transition:border-color .2s; }
.auth-field input:focus { border-color:rgba(124,58,237,0.5); box-shadow:0 0 0 3px rgba(124,58,237,0.1); }
.auth-field input::placeholder { color:var(--text-dim); }
.auth-divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--text-fade); font-size:0.75rem; }
.auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-top">
            <div style="font-size:2.5rem;margin-bottom:12px;">🧭</div>
            <h2 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:white;margin:0 0 6px;">Welcome Back!</h2>
            <p style="color:rgba(255,255,255,0.45);font-size:0.82rem;margin:0;">Apne account mein login karo</p>
        </div>
        <div class="auth-body">
            <form method="POST">
                <div class="auth-field">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="auth-field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-glow w-100" style="justify-content:center;padding:13px;font-size:0.95rem;margin-top:4px;">
                    Login Karo →
                </button>
            </form>
            <div class="auth-divider">ya</div>
            <a href="/assessment" style="display:block;text-align:center;padding:11px;border-radius:12px;border:1px dashed rgba(255,255,255,0.12);color:var(--text-dim);text-decoration:none;font-size:0.82rem;transition:all .2s;" onmouseover="this.style.borderColor='rgba(124,58,237,0.3)';this.style.color='#c4b5fd'" onmouseout="this.style.borderColor='rgba(255,255,255,0.12)';this.style.color='var(--text-dim)'">
                Login ke bina bhi Assessment lo 👀
            </a>
            <div style="text-align:center;margin-top:20px;font-size:0.82rem;color:var(--text-dim);">
                Account nahi hai? <a href="/register" style="color:#a78bfa;text-decoration:none;font-weight:600;">Register karo →</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
