<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if mode == 'login' %}Login{% else %}Create Account{% endif %} — Marg Darshak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    :root { --primary:#667eea; --secondary:#764ba2; --grad:linear-gradient(135deg,#667eea,#764ba2); }
    * { box-sizing: border-box; }
    body {
        font-family: 'Poppins', sans-serif; font-size: 15px;
        min-height: 100vh; margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        display: flex; align-items: center; justify-content: center;
        padding: 20px;
    }

    .auth-card {
        background: white; border-radius: 20px;
        width: 100%; max-width: 420px;
        box-shadow: 0 20px 60px rgba(0,0,0,.25);
        overflow: hidden;
    }

    .auth-header {
        background: var(--grad); color: white;
        padding: 30px 32px 24px; text-align: center;
    }
    .auth-header .brand-icon {
        width: 64px; height: 64px; border-radius: 18px;
        background: rgba(255,255,255,.2);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.8rem; margin: 0 auto 14px;
    }
    .auth-header h2 { font-weight: 700; font-size: 1.4rem; margin: 0 0 4px; }
    .auth-header p { opacity: .8; font-size: .85rem; margin: 0; }

    .auth-body { padding: 28px 32px; }

    .form-label { font-size: .83rem; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .form-control {
        border-radius: 10px; font-family: 'Poppins',sans-serif;
        font-size: .875rem; padding: 10px 14px;
        border: 1.5px solid #e5e7eb; transition: border .2s;
    }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102,126,234,.12); }
    .input-icon { position: relative; }
    .input-icon i {
        position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
        color: #9ca3af; font-size: .9rem;
    }
    .input-icon .form-control { padding-left: 38px; }

    .btn-auth {
        width: 100%; padding: 11px; border-radius: 50px; border: none;
        background: var(--grad); color: white;
        font-family: 'Poppins',sans-serif; font-size: .9rem; font-weight: 600;
        cursor: pointer; transition: all .25s;
        box-shadow: 0 4px 14px rgba(102,126,234,.4);
    }
    .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,.5); }
    .btn-auth:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .btn-guest {
        width: 100%; padding: 10px; border-radius: 50px;
        border: 1.5px solid #e5e7eb; background: transparent;
        color: #6b7280; font-family: 'Poppins',sans-serif;
        font-size: .875rem; font-weight: 500; cursor: pointer;
        transition: all .2s; text-decoration: none; display: block; text-align: center;
    }
    .btn-guest:hover { border-color: var(--primary); color: var(--primary); }

    .divider {
        text-align: center; position: relative; margin: 16px 0;
        font-size: .78rem; color: #9ca3af;
    }
    .divider::before, .divider::after {
        content: ''; position: absolute; top: 50%;
        width: 42%; height: 1px; background: #e5e7eb;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .alert-error {
        background: #fef2f2; border: 1px solid #fecaca;
        color: #dc2626; border-radius: 10px;
        padding: 10px 14px; font-size: .83rem;
        display: none; margin-bottom: 14px;
    }
    .alert-error.show { display: flex; align-items: center; gap: 8px; }

    .switch-link { text-align: center; font-size: .83rem; color: #6b7280; margin-top: 18px; }
    .switch-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .switch-link a:hover { text-decoration: underline; }

    .tab-btns { display: flex; background: #f3f4f6; border-radius: 10px; padding: 4px; margin-bottom: 20px; }
    .tab-btn {
        flex: 1; padding: 8px; border-radius: 8px; border: none;
        background: transparent; font-family: 'Poppins',sans-serif;
        font-size: .85rem; font-weight: 600; color: #6b7280; cursor: pointer; transition: all .2s;
    }
    .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    .strength-bar { height: 4px; border-radius: 4px; background: #e5e7eb; margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 4px; width: 0; transition: all .3s; }

    @media(max-width:480px) {
        .auth-body { padding: 24px 20px; }
        .auth-header { padding: 24px 20px 20px; }
    }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-header">
        <div class="brand-icon"><i class="fas fa-compass"></i></div>
        <h2>Marg Darshak</h2>
        <p style="font-family:'Noto Sans Devanagari',sans-serif;">जीवन के हर पड़ाव पर सही दिशा</p>
    </div>

    <div class="auth-body">
        <!-- TABS -->
        <div class="tab-btns">
            <button class="tab-btn {{ 'active' if mode == 'login' }}" onclick="switchTab('login')">
                <i class="fas fa-sign-in-alt me-1"></i> Login
            </button>
            <button class="tab-btn {{ 'active' if mode == 'register' }}" onclick="switchTab('register')">
                <i class="fas fa-user-plus me-1"></i> Sign Up
            </button>
        </div>

        <!-- ERROR ALERT -->
        <div class="alert-error" id="authError">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorMsg"></span>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm" style="{{ '' if mode == 'login' else 'display:none;' }}">
            <div class="mb-3">
                <label class="form-label">Email or Username</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-control" id="loginId"
                        placeholder="Enter email or username" autocomplete="username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="loginPwd"
                        placeholder="Enter your password" autocomplete="current-password">
                </div>
            </div>
            <button class="btn-auth mt-1" id="loginBtn" onclick="doLogin()">
                <span id="loginBtnText"><i class="fas fa-sign-in-alt me-2"></i>Login</span>
            </button>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" style="{{ '' if mode == 'register' else 'display:none;' }}">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-control" id="regUser"
                        placeholder="Choose a username" autocomplete="username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="form-control" id="regEmail"
                        placeholder="your@email.com" autocomplete="email">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="regPwd"
                        placeholder="Min. 6 characters" autocomplete="new-password"
                        oninput="checkStrength(this.value)">
                </div>
                <div class="strength-bar mt-1">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
            </div>
            <button class="btn-auth mt-1" id="regBtn" onclick="doRegister()">
                <span id="regBtnText"><i class="fas fa-user-plus me-2"></i>Create Account</span>
            </button>
        </div>

        <div class="divider">or</div>

        <a href="/guest" class="btn-guest">
            <i class="fas fa-eye me-2"></i> Continue as Guest
        </a>

        <div class="switch-link" id="switchHint">
            {% if mode == 'login' %}
            Don't have an account? <a href="#" onclick="switchTab('register')">Sign up free</a>
            {% else %}
            Already have an account? <a href="#" onclick="switchTab('login')">Login</a>
            {% endif %}
        </div>
    </div>
</div>

<script>
function switchTab(tab) {
    document.getElementById('loginForm').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b,i) =>
        b.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
    document.getElementById('switchHint').innerHTML = tab === 'login'
        ? 'Don\'t have an account? <a href="#" onclick="switchTab(\'register\')">Sign up free</a>'
        : 'Already have an account? <a href="#" onclick="switchTab(\'login\')">Login</a>';
    hideError();
}

function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('authError').classList.add('show');
}
function hideError() { document.getElementById('authError').classList.remove('show'); }

function setLoading(btnId, textId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    document.getElementById(textId).innerHTML = loading
        ? '<span class="spinner-border spinner-border-sm me-2"></span>Please wait...'
        : (btnId === 'loginBtn'
            ? '<i class="fas fa-sign-in-alt me-2"></i>Login'
            : '<i class="fas fa-user-plus me-2"></i>Create Account');
}

async function doLogin() {
    hideError();
    const identifier = document.getElementById('loginId').value.trim();
    const password   = document.getElementById('loginPwd').value.trim();
    if (!identifier || !password) { showError('Please fill in all fields.'); return; }
    setLoading('loginBtn','loginBtnText', true);
    try {
        const res  = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identifier, password })
        });
        const data = await res.json();
        if (data.success) window.location.href = data.redirect;
        else showError(data.error || 'Login failed. Please try again.');
    } catch { showError('Network error. Please try again.'); }
    setLoading('loginBtn','loginBtnText', false);
}

async function doRegister() {
    hideError();
    const username = document.getElementById('regUser').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPwd').value.trim();
    if (!username || !email || !password) { showError('Please fill in all fields.'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
    setLoading('regBtn','regBtnText', true);
    try {
        const res  = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (data.success) window.location.href = data.redirect;
        else showError(data.error || 'Registration failed. Please try again.');
    } catch { showError('Network error. Please try again.'); }
    setLoading('regBtn','regBtnText', false);
}

function checkStrength(pw) {
    const fill = document.getElementById('strengthFill');
    let score = 0;
    if (pw.length >= 6) score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const colors = ['','#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
    const widths = ['0%','20%','40%','60%','80%','100%'];
    fill.style.background = colors[score] || '#ef4444';
    fill.style.width = widths[score] || '0%';
}

// Enter key support
document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('loginForm').style.display !== 'none') doLogin();
    else doRegister();
});
</script>
</body>
</html>
